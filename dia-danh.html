<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">
    <div id="header-placeholder"></div>


    <main class="max-w-5xl mx-auto py-16 px-6">
        <h1 class="text-3xl font-bold mb-12">Tất cả địa danh</h1>
        
        <div id="full-blog-list" class="flex flex-col gap-8"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/blog-list.js"></script>
    <script>
        function renderFullBlogs() {
            const container = document.getElementById('full-blog-list');
            container.innerHTML = BLOG_POSTS.map(post => `
                <div class="flex flex-col md:flex-row bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-md transition cursor-pointer" onclick="window.location.href='${post.link}'">
                    <div class="md:w-2/5 h-64 md:h-auto overflow-hidden">
                        <img src="${post.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="md:w-3/5 p-8 flex flex-col justify-center">
                        <h2 class="text-2xl font-bold text-slate-800 mb-3 leading-tight hover:text-blue-600 transition">${post.title}</h2>
                        <div class="flex items-center gap-4 text-sm text-slate-400 mb-6">
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i> ${post.date}</span>
                            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium text-xs">${post.category}</span>
                        </div>
                        <p class="text-slate-500 leading-relaxed mb-6 line-clamp-3">${post.description}</p>
                        <div class="flex items-center text-blue-600 font-semibold gap-2">
                            Đọc thêm <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        renderFullBlogs();
    </script>
    <script src="js/shared-components.js"></script>
</body>
</html>
