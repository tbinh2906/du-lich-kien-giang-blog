<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Du lịch Kiên Giang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .list-layout { display: flex; flex-direction: column; gap: 2rem; }
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(1, minmax(0, 1fr)); 
            gap: 2rem; 
        }
        @media (min-width: 768px) {
            .grid-layout { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <header class="pt-40 pb-20 px-6 text-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-white border-b border-slate-100">
        <h1 class="text-6xl md:text-7xl font-bold text-slate-900 mb-6 tracking-tight">Blog</h1>
        <div class="h-1 w-20 bg-slate-200 mx-auto mb-8"></div>
        <p class="max-w-2xl mx-auto text-slate-500 text-lg md:text-xl leading-relaxed">
            Nơi chia sẻ những trải nghiệm, kiến thức và dòng chảy suy nghĩ về <br class="hidden md:block"> du lịch, cuộc sống và hơn thế nữa.
        </p>
    </header>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <div class="flex flex-wrap items-center justify-between mb-12 bg-white p-4 rounded-xl shadow-sm border border-slate-100 sticky top-24 z-30">
            <div class="flex items-center gap-4">
                <span class="text-sm text-slate-400">Xem theo:</span>
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button onclick="changeLayout('list')" id="btn-list" class="p-2 rounded-md bg-white shadow-sm text-blue-600 transition">
                        <i data-lucide="list" class="w-5 h-5"></i>
                    </button>
                    <button onclick="changeLayout('grid')" id="btn-grid" class="p-2 rounded-md text-slate-500 hover:text-blue-600 transition">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-6 relative">
                <button onclick="toggleSort()" class="text-slate-500 hover:text-blue-600 transition flex items-center gap-2">
                    <i data-lucide="arrow-up-down" class="w-5 h-5"></i>
                    <span id="sort-label" class="text-sm font-medium">Mới nhất</span>
                </button>

                <div class="relative group">
                    <button onclick="toggleFilterMenu()" class="text-slate-500 hover:text-blue-600 transition">
                        <i data-lucide="filter" class="w-5 h-5"></i>
                    </button>
                    <div id="filter-menu" class="hidden absolute right-0 mt-4 w-64 bg-white border border-slate-100 shadow-xl rounded-2xl p-6 z-50">
                        <h3 class="font-bold text-slate-800 mb-4">Lọc theo danh mục</h3>
                        <div id="category-list" class="space-y-3"></div>
                        <button onclick="clearFilter()" class="mt-6 w-full text-right text-sm text-blue-600 font-semibold hover:underline">Xóa bộ lọc</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="blog-container" class="list-layout"></div>

        <div id="loading-trigger" class="py-20 text-center text-slate-400"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/blog-list.js"></script>
    <script src="js/shared-components.js"></script>
    <script>
        let currentLayout = 'list';
        let isDescending = true;
        let selectedCategory = null;
        let itemsToShow = 3;
        let loadedCount = 0;

        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function renderBlogs(isAppend = false) {
            const container = document.getElementById('blog-container');
            const trigger = document.getElementById('loading-trigger');
            
            // 1. Lọc
            let filteredData = [...BLOG_POSTS];
            if (selectedCategory) {
                filteredData = filteredData.filter(post => post.category === selectedCategory);
            }

            // 2. Sắp xếp
            filteredData.sort((a, b) => {
                const dateA = parseDate(a.date);
                const dateB = parseDate(b.date);
                return isDescending ? dateB - dateA : dateA - dateB;
            });

            // 3. Reset nếu không phải là tải thêm
            if (!isAppend) {
                loadedCount = 0;
                container.innerHTML = "";
            }

            // 4. Lấy dữ liệu phân đoạn
            const displayData = filteredData.slice(loadedCount, loadedCount + itemsToShow);
            loadedCount += displayData.length;

            // 5. Tạo HTML
            const html = displayData.map(post => {
                if (currentLayout === 'list') {
                    return `
                    <div class="flex flex-col md:flex-row bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer group mb-2" onclick="window.location.href='${post.link}'">
                        <div class="md:w-2/5 h-56 md:h-auto overflow-hidden">
                            <img src="${post.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        </div>
                        <div class="md:w-3/5 p-8 flex flex-col justify-center">
                            <h2 class="text-2xl font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition">${post.title}</h2>
                            <div class="flex items-center gap-3 text-xs text-slate-400 mb-4 font-medium">
                                <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${post.date}</span>
                                <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded">${post.category}</span>
                            </div>
                            <p class="text-slate-500 text-sm leading-relaxed mb-6 line-clamp-2">${post.description}</p>
                            <div class="flex items-center text-blue-600 font-bold text-xs gap-2">Đọc thêm <i data-lucide="arrow-right" class="w-4 h-4"></i></div>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col" onclick="window.location.href='${post.link}'">
                        <div class="aspect-video overflow-hidden">
                            <img src="${post.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="text-[10px] font-bold text-blue-600 mb-2 uppercase tracking-widest">${post.category}</div>
                            <h3 class="text-lg font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition line-clamp-2 leading-tight">${post.title}</h3>
                            <p class="text-slate-500 text-sm mb-6 line-clamp-3">${post.description}</p>
                            <div class="mt-auto flex items-center justify-between text-slate-400 text-[10px]">
                                <span>${post.date}</span>
                                <i data-lucide="move-right" class="w-4 h-4 text-blue-600"></i>
                            </div>
                        </div>
                    </div>`;
                }
            }).join('');

            container.insertAdjacentHTML('beforeend', html);

            // 6. Xử lý hiển thị "Hết bài" hoặc "Loading"
            if (loadedCount >= filteredData.length) {
                trigger.innerHTML = `<div class="py-10 text-slate-400 text-sm italic">--- Bạn đã xem hết bài viết ---</div>`;
            } else {
                trigger.innerHTML = `
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
                    <p class="text-sm italic">Đang tải thêm bài viết...</p>`;
            }

            lucide.createIcons();
        }

        function changeLayout(layout) {
            currentLayout = layout;
            document.getElementById('blog-container').className = (layout === 'list') ? 'list-layout' : 'grid-layout';
            
            // Cập nhật giao diện nút bấm chuẩn xác
            const btnList = document.getElementById('btn-list');
            const btnGrid = document.getElementById('btn-grid');
            
            if(layout === 'list') {
                btnList.className = "p-2 rounded-md bg-white shadow-sm text-blue-600 transition";
                btnGrid.className = "p-2 rounded-md text-slate-500 hover:text-blue-600 transition";
            } else {
                btnGrid.className = "p-2 rounded-md bg-white shadow-sm text-blue-600 transition";
                btnList.className = "p-2 rounded-md text-slate-500 hover:text-blue-600 transition";
            }

            renderBlogs(false);
        }

        function initFilterMenu() {
            const categories = [...new Set(BLOG_POSTS.map(p => p.category))];
            const listContainer = document.getElementById('category-list');
            listContainer.innerHTML = categories.map(cat => `
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="radio" name="category" class="w-4 h-4 text-blue-600" 
                        ${selectedCategory === cat ? 'checked' : ''} onchange="filterByCategory('${cat}')">
                    <span class="text-slate-600 group-hover:text-blue-600 transition">${cat}</span>
                </label>
            `).join('');
        }

        function filterByCategory(cat) {
            selectedCategory = cat;
            renderBlogs(false);
            toggleFilterMenu();
        }

        function clearFilter() {
            selectedCategory = null;
            const radios = document.getElementsByName('category');
            radios.forEach(r => r.checked = false);
            renderBlogs(false);
        }

        function toggleFilterMenu() {
            document.getElementById('filter-menu').classList.toggle('hidden');
        }

        function toggleSort() {
            isDescending = !isDescending;
            document.getElementById('sort-label').innerText = isDescending ? "Mới nhất" : "Cũ nhất";
            renderBlogs(false);
        }

        window.onscroll = () => {
            const container = document.getElementById('blog-container');
            // Lấy dữ liệu gốc để so sánh độ dài khi cuộn
            let filteredDataLength = selectedCategory 
                ? BLOG_POSTS.filter(p => p.category === selectedCategory).length 
                : BLOG_POSTS.length;

            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (loadedCount < filteredDataLength) {
                    renderBlogs(true);
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            initFilterMenu();
            renderBlogs();
        });
    </script>
</body>
</html>
